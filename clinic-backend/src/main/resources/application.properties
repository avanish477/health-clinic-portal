# MySQL Database configuration (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3307/clinicdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# H2 Console config (disabled since using MySQL)
spring.h2.console.enabled=false

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port configuration
server.port=8080

# Logging configurations
logging.level.org.springframework.security=INFO
logging.level.com.clinic.clinic_backend=DEBUG
